<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" />
    <title>Population and Migration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Population and Migration</h1>
    <div id="population">
      <h2>Population</h2>
      <h3>Total population:</h3>
      <p>17,833,885 (As of 2025)</p>
      <h3>Composition</h3>
      <ul>
        <li id="pyramid">
          <span>Population pyramid</span>
          <img
            src="netherlands_population_pyramid.png"
            alt="Population pyramid for the Netherlands"
          />
        </li>
        <li id="age-gender">
          <p>Age (As of 2024)</p>
          <ul id="age">
            <li>0-14 years: 15.2%</li>
            <li>15-64 years: 64.1%</li>
            <li>65 and over: 20.7%</li>
          </ul>
          <p>Gender</p>
          <ul>
            <li>Male: 8,844,100</li>
            <li>Female: 8,928,278</li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
